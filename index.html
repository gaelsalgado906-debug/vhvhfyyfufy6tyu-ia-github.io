<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gael Script - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; }
        .serif-font { font-family: 'Playfair Display', serif; }
        .slow-transition { transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex items-center justify-center overflow-hidden">

    <div id="intro-section" class="slow-transition opacity-0 scale-95 text-center">
        <h1 class="serif-font text-7xl md:text-9xl text-white italic mb-8">
            Gael Script
        </h1>
        <button id="btn-empezar" class="group relative px-8 py-3 font-medium tracking-widest uppercase text-xs text-white overflow-hidden rounded-full border border-white/10 bg-white/5 hover:bg-white/10 transition-all duration-500">
            <span class="relative z-10">Empezar</span>
            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
        </button>
    </div>

    <div id="panel-section" class="hidden fixed inset-0 flex items-center justify-center p-6">
        <div id="panel-card" class="opacity-0 translate-y-10 slow-transition w-full max-w-2xl bg-[#0a0a0a] border border-white/5 rounded-2xl shadow-2xl shadow-black overflow-hidden">
            
            <div class="px-6 py-4 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                    <span class="text-[10px] uppercase tracking-[0.2em] font-semibold text-zinc-500">System Status</span>
                </div>
                <span class="text-xs text-zinc-600 italic">v1.0.0</span>
            </div>

            <div class="p-10 text-center">
                <h2 class="serif-font text-4xl text-white mb-4">No Update</h2>
                <p class="text-zinc-500 text-sm leading-relaxed max-w-sm mx-auto">
                    El sistema se encuentra en su versión más estable. No se requieren descargas adicionales en este momento.
                </p>
                
                <div class="mt-8 grid grid-cols-2 gap-4">
                    <div class="p-4 rounded-xl bg-white/[0.02] border border-white/5">
                        <p class="text-[10px] text-zinc-600 uppercase mb-1">Última revisión</p>
                        <p class="text-white text-sm">Hoy, 16:45</p>
                    </div>
                    <div class="p-4 rounded-xl bg-white/[0.02] border border-white/5">
                        <p class="text-[10px] text-zinc-600 uppercase mb-1">Servidor</p>
                        <p class="text-emerald-500 text-sm font-medium">Online</p>
                    </div>
                </div>
            </div>

            <div class="px-6 py-4 bg-white/[0.01] text-center">
                <button onclick="location.reload()" class="text-[10px] text-zinc-600 hover:text-white transition-colors uppercase tracking-widest">
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </div>

    <script>
        const intro = document.getElementById('intro-section');
        const panelSection = document.getElementById('panel-section');
        const panelCard = document.getElementById('panel-card');
        const btnEmpezar = document.getElementById('btn-empezar');

        // 1. Animación de entrada suave
        window.addEventListener('load', () => {
            setTimeout(() => {
                intro.classList.remove('opacity-0', 'scale-95');
                intro.classList.add('opacity-100', 'scale-100');
            }, 500);
        });

        // 2. Transición al Panel
        btnEmpezar.addEventListener('click', () => {
            // Desvanecer intro
            intro.classList.add('opacity-0', 'scale-110', 'blur-xl');
            
            setTimeout(() => {
                intro.classList.add('hidden');
                panelSection.classList.remove('hidden');
                
                // Animación lenta del panel
                setTimeout(() => {
                    panelCard.classList.remove('opacity-0', 'translate-y-10');
                    panelCard.classList.add('opacity-100', 'translate-y-0');
                }, 100);
            }, 1200);
        });
    </script>
</body>
</html>
